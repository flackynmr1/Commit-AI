<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Emailhistorik - FlerKunder</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="main">
  <h1>Emailhistorik</h1>
  <p>Leads som fått Gmail-utkast och rensats från aktiva listan.</p>

  <a class="btn" href="/leads/">Tillbaka till Lead Agent</a>

  <table>
    <tr>
      <th>Företag</th>
      <th>Email</th>
      <th>Bransch</th>
      <th>Stad</th>
      <th>Status</th>
      <th>Datum</th>
    </tr>

    {% for item in history %}
    <tr>
      <td>{{ item.company_name }}</td>
      <td>{{ item.email }}</td>
      <td>{{ item.industry }}</td>
      <td>{{ item.city }}</td>
      <td>{{ item.action }}</td>
      <td>{{ item.created_at }}</td>
    </tr>
    {% endfor %}
  </table>
</div>
</body>
</html>
