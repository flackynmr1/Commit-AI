<!DOCTYPE html>
<html lang="sv">
<head>    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Admin Login - FlerKunder</title>
<link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='mobile_fix.css') }}"></head>

<body>

<section class="section">
  <h2>Admin Login</h2>
  <p>Skriv lösenordet för att komma in i adminportalen.</p>

  {% if error %}
  <p style="color:#ef4444;font-weight:800;">{{ error }}</p>
  {% endif %}

  <form method="POST" action="/admin-login" class="lead-form">
    <input type="password" name="password" placeholder="Lösenord" required>
    <button class="btn" type="submit">Logga in</button>
  </form>

  <p style="margin-top:20px;">
    <a href="/dashboard" style="color:#94a3b8;">Till startsidan</a>
  </p>
</section>

</body>
</html>
