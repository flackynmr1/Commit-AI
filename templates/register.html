<!DOCTYPE html>
<html lang="sv">
<head>    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Skapa konto - FlerKunder</title>
<style>
body{margin:0;background:#05070f;color:white;font-family:Arial,sans-serif}
.box{max-width:440px;margin:90px auto;background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:34px}
h1{margin-top:0}
input{width:100%;padding:15px;margin:10px 0;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:#020617;color:white}
button,a{display:block;text-align:center;width:100%;box-sizing:border-box;border:0;border-radius:14px;background:linear-gradient(135deg,#23d5ff,#ff2d93);color:white;font-weight:900;padding:14px;text-decoration:none;margin-top:12px}
p{color:#94a3b8}
.flash{background:rgba(255,45,147,.15);padding:12px;border-radius:14px;margin-bottom:12px}
</style>


<style id="final-mobile-fix">
html,body{width:100%!important;min-height:100%!important;overflow-x:hidden!important}
@media(max-width:768px){
 body{margin:0!important;padding:0!important;overflow-y:auto!important}
 .page,.container,main,section{width:100%!important;max-width:100%!important;padding:18px!important;margin:0!important}
 .card,.panel,.box,.login-card,.register-card,.checkout-card,.table-card,.live-card{
   width:100%!important;max-width:100%!important;min-width:0!important;
   padding:20px!important;margin:0 0 16px!important;border-radius:22px!important
 }
 .hero,.grid,.cards,.stats,.form-grid,.checkout,.dashboard-grid{
   display:grid!important;grid-template-columns:1fr!important;gap:16px!important
 }
 nav,.nav,.navbar{width:100%!important;flex-direction:column!important;align-items:flex-start!important;padding:14px 18px!important}
 .nav-links{width:100%!important;display:flex!important;overflow-x:auto!important;gap:8px!important}
 .nav-links a{white-space:nowrap!important;font-size:13px!important}
 h1{font-size:32px!important;line-height:1.08!important}
 h2{font-size:24px!important}
 input,select,textarea{width:100%!important;font-size:16px!important}
 button,.btn{width:100%!important;min-height:48px!important;justify-content:center!important}
 img,video,iframe{max-width:100%!important;height:auto!important}
 .table-card{overflow-x:auto!important}
 table{min-width:850px!important}
}
</style>
    <link rel="stylesheet" href="{{ url_for('static', filename='mobile_fix.css') }}"></head>
<body>
<div class="box">
  <h1>Skapa konto</h1>
  <p>Du får testa 5 leads gratis.</p>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="/auth/register-page">
    <input name="email" placeholder="Email">
    <input name="password" type="password" placeholder="Lösenord">
    <button type="submit">Skapa konto</button>
  </form>

  <a href="/auth/login-page">Har redan konto</a>
</div>
</body>
</html>
